<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero-Terra Couriers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #game-container { border: 4px solid #fff; box-shadow: 0 0 20px #00ffcc; border-radius: 8px; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #00ffcc; pointer-events: none; z-index: 100; }
        .biome-text { font-size: 0.8rem; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin: 0; color: #00ffcc;">Aero-Terra Couriers</h3>
        <p>Use <b>Arrow Keys</b> to drive.</p>
        <p id="player-count">Couriers Online: 1</p>
        <div class="biome-text">East: Ice Lake (Friction)</div>
        <div class="biome-text">North: Wind Canyon (Air Resistance)</div>
    </div>

    <div id="game-container"></div>

<script>
    // ==========================================
    // 1. FIREBASE SETUP & PLAYER IDENTITY
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
        authDomain: "symmetry-and-nets.firebaseapp.com",
        databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "symmetry-and-nets",
        storageBucket: "symmetry-and-nets.firebasestorage.app",
        messagingSenderId: "250211420064",
        appId: "1:250211420064:web:fe4a064715042bedf546c5"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let myId = sessionStorage.getItem('aeroId');
    if (!myId) {
        myId = 'Courier_' + Math.random().toString(36).substr(2, 6);
        sessionStorage.setItem('aeroId', myId);
    }
    const playersRef = db.ref('aero_terra/players');
    playersRef.child(myId).onDisconnect().remove();

    // ==========================================
    // 2. PHASER GAME LOGIC
    // ==========================================
    
    let player;
    let cursors;
    let iceZone;
    let windZone;
    let walls;
    let otherPlayers = {}; 

    function preload() { }

    function create() {
        const scene = this;

        // 1. Build the World Background
        scene.physics.world.setBounds(0, 0, 1800, 1200);
        scene.add.grid(900, 600, 1800, 1200, 50, 50, 0x222222).setAltFillStyle(0x2a2a2a);

        // 2. Build the Biomes
        iceZone = scene.add.rectangle(1500, 600, 600, 600, 0x00aaff, 0.3);
        scene.physics.add.existing(iceZone, true);

        windZone = scene.add.rectangle(900, 200, 600, 400, 0xffffff, 0.1);
        scene.physics.add.existing(windZone, true);

        // 3. Build the Solid Walls
        walls = scene.physics.add.staticGroup();
        function buildWall(x, y, width, height) {
            const rect = scene.add.rectangle(x, y, width, height, 0x555555);
            walls.add(rect);
        }
        // North Walls (To Wind Canyon)
        buildWall(700, 400, 400, 20); 
        buildWall(1100, 400, 400, 20);
        // East Walls (To Ice Lake)
        buildWall(1200, 450, 20, 300);
        buildWall(1200, 750, 20, 300);

        // 4. Create the Player
        player = scene.add.rectangle(900, 600, 30, 30, 0x00ffcc);
        scene.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);
        player.body.setMaxVelocity(300);
        player.oldPosition = { x: player.x, y: player.y };

        // Turn on Wall Collisions
        scene.physics.add.collider(player, walls);

        // 5. Camera & Controls
        scene.cameras.main.setBounds(0, 0, 1800, 1200);
        scene.cameras.main.startFollow(player, true, 0.1, 0.1);
        cursors = scene.input.keyboard.createCursorKeys();

        // 6. Multiplayer Listeners
        playersRef.on('value', (snapshot) => {
            const playersData = snapshot.val() || {};
            let onlineCount = 0;

            Object.keys(playersData).forEach((id) => {
                onlineCount++;
                const data = playersData[id];
                if (id !== myId) {
                    if (!otherPlayers[id]) {
                        otherPlayers[id] = scene.add.rectangle(data.x, data.y, 30, 30, 0xff4444);
                    } else {
                        otherPlayers[id].setPosition(data.x, data.y);
                    }
                }
            });

            document.getElementById('player-count').innerText = `Couriers Online: ${onlineCount}`;

            Object.keys(otherPlayers).forEach((id) => {
                if (!playersData[id]) {
                    otherPlayers[id].destroy(); 
                    delete otherPlayers[id];    
                }
            });
        });
    }

    function update() {
        if (!player) return;

        // 1. SCIENCE MECHANICS: Check Environment
        const onIce = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), iceZone.getBounds());
        const inWind = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), windZone.getBounds());

        // A. Apply Friction (Drag)
        player.body.setDrag(onIce ? 50 : 1500);

        // B. Apply Air Resistance (Wind Force pushing South)
        const windForce = inWind ? 1200 : 0;

        // 2. MOVEMENT LOGIC (Combining Engine Force + Wind Force)
        if (cursors.left.isDown) player.body.setAccelerationX(-1500);
        else if (cursors.right.isDown) player.body.setAccelerationX(1500);
        else player.body.setAccelerationX(0);

        if (cursors.up.isDown) player.body.setAccelerationY(-1500 + windForce);
        else if (cursors.down.isDown) player.body.setAccelerationY(1500 + windForce);
        else player.body.setAccelerationY(0 + windForce); // Wind pushes even when keys are released!

        // 3. MULTIPLAYER BROADCASTER
        const xChanged = Math.abs(player.x - player.oldPosition.x) > 1;
        const yChanged = Math.abs(player.y - player.oldPosition.y) > 1;

        if (xChanged || yChanged) {
            playersRef.child(myId).set({ x: player.x, y: player.y });
            player.oldPosition = { x: player.x, y: player.y };
        }
    }

    // ==========================================
    // 3. PHASER BOOTSTRAP
    // ==========================================
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 0 }, debug: false } 
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

</script>
</body>
</html>
