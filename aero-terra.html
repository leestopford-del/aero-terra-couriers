<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero-Terra Couriers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #game-container { border: 4px solid #fff; box-shadow: 0 0 20px #00ffcc; border-radius: 8px; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #00ffcc; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin: 0; color: #00ffcc;">Aero-Terra Couriers</h3>
        <p>Use <b>Arrow Keys</b> to drive.</p>
        <p id="player-count">Couriers Online: 1</p>
    </div>

    <div id="game-container"></div>

<script>
    // ==========================================
    // 1. FIREBASE SETUP & PLAYER IDENTITY
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
        authDomain: "symmetry-and-nets.firebaseapp.com",
        databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "symmetry-and-nets",
        storageBucket: "symmetry-and-nets.firebasestorage.app",
        messagingSenderId: "250211420064",
        appId: "1:250211420064:web:fe4a064715042bedf546c5"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    // Create a unique ID for this player's session
    let myId = sessionStorage.getItem('aeroId');
    if (!myId) {
        myId = 'Courier_' + Math.random().toString(36).substr(2, 6);
        sessionStorage.setItem('aeroId', myId);
    }

    // Database Reference for all players
    const playersRef = db.ref('aero_terra/players');

    // Automatically remove my data from Firebase if I close the tab
    playersRef.child(myId).onDisconnect().remove();

    // ==========================================
    // 2. PHASER GAME LOGIC
    // ==========================================
    
    let player;         // My local green square
    let cursors;
    let iceZone;
    let otherPlayers = {}; // A dictionary to store the red squares of other players

    function preload() { }

    function create() {
        const scene = this; // Store reference to the scene for Firebase callbacks

        // 1. Build the World
        scene.physics.world.setBounds(0, 0, 1800, 1200);
        scene.add.grid(900, 600, 1800, 1200, 50, 50, 0x333333).setAltFillStyle(0x444444);

        // 2. Add Ice Zone
        iceZone = scene.add.rectangle(1200, 300, 400, 400, 0x00aaff, 0.5);
        scene.physics.add.existing(iceZone, true);

        // 3. Create MY Player (Green)
        // Spawn randomly near the center so players don't spawn exactly on top of each other
        const startX = 850 + Math.random() * 100;
        const startY = 550 + Math.random() * 100;
        
        player = scene.add.rectangle(startX, startY, 30, 30, 0x00ffcc);
        scene.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);
        player.body.setMaxVelocity(300);

        // Save old position to prevent spamming the database when standing still
        player.oldPosition = { x: player.x, y: player.y };

        // 4. Camera & Controls
        scene.cameras.main.setBounds(0, 0, 1800, 1200);
        scene.cameras.main.startFollow(player, true, 0.1, 0.1);
        cursors = scene.input.keyboard.createCursorKeys();

        // ---------------------------------------------------------
        // MULTIPLAYER LISTENERS (Receiving data from Firebase)
        // ---------------------------------------------------------

        // When ANY player joins or moves (including ourselves)
        playersRef.on('value', (snapshot) => {
            const playersData = snapshot.val() || {};
            let onlineCount = 0;

            Object.keys(playersData).forEach((id) => {
                onlineCount++;
                const data = playersData[id];

                // If this is NOT me, we need to draw/update a red square
                if (id !== myId) {
                    if (!otherPlayers[id]) {
                        // NEW PLAYER JOINED: Create a red square for them
                        otherPlayers[id] = scene.add.rectangle(data.x, data.y, 30, 30, 0xff4444);
                    } else {
                        // EXISTING PLAYER MOVED: Update their position
                        otherPlayers[id].setPosition(data.x, data.y);
                    }
                }
            });

            // Update the UI text
            document.getElementById('player-count').innerText = `Couriers Online: ${onlineCount}`;

            // Remove players who disconnected (their ID is in our dictionary, but no longer in Firebase)
            Object.keys(otherPlayers).forEach((id) => {
                if (!playersData[id]) {
                    otherPlayers[id].destroy(); // Remove sprite from screen
                    delete otherPlayers[id];    // Remove from dictionary
                }
            });
        });
    }

    function update() {
        if (!player) return;

        // 1. MOVEMENT LOGIC
        if (cursors.left.isDown) player.body.setAccelerationX(-1500);
        else if (cursors.right.isDown) player.body.setAccelerationX(1500);
        else player.body.setAccelerationX(0);

        if (cursors.up.isDown) player.body.setAccelerationY(-1500);
        else if (cursors.down.isDown) player.body.setAccelerationY(1500);
        else player.body.setAccelerationY(0);

        // 2. SCIENCE MECHANICS: Friction
        const onIce = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), iceZone.getBounds());
        player.body.setDrag(onIce ? 50 : 1500);

        // ---------------------------------------------------------
        // MULTIPLAYER BROADCASTER (Sending data to Firebase)
        // ---------------------------------------------------------
        
        // Only send data to Firebase if we actually moved! (Saves bandwidth)
        const xChanged = Math.abs(player.x - player.oldPosition.x) > 1;
        const yChanged = Math.abs(player.y - player.oldPosition.y) > 1;

        if (xChanged || yChanged) {
            playersRef.child(myId).set({
                x: player.x,
                y: player.y
            });
            // Update old position so we don't spam the database next frame
            player.oldPosition = { x: player.x, y: player.y };
        }
    }

    // ==========================================
    // 3. PHASER BOOTSTRAP
    // ==========================================
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 0 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

</script>
</body>
</html>
