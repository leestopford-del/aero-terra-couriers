<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero-Terra Couriers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* Removed the borders and set the body to fill the screen */
        body { margin: 0; padding: 0; background: #1a1a1a; overflow: hidden; color: white; font-family: sans-serif; }
        #game-container { width: 100vw; height: 100vh; }
        
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #00ffcc; z-index: 100; pointer-events: none; }
        #inventory { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #ffcc00; z-index: 100; }
        .equip-btn { display: block; width: 100%; margin: 5px 0; padding: 8px; background: #333; color: white; border: 1px solid #777; cursor: pointer; border-radius: 4px; }
        .equip-btn.active { background: #ffcc00; color: black; font-weight: bold; }
        
        #dialogue-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 600px; background: rgba(0,0,0,0.9); border: 2px solid #fff; padding: 15px; border-radius: 8px; display: none; z-index: 100; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui">
        <h3 style="margin: 0; color: #00ffcc;">Aero-Terra Couriers</h3>
        <p id="player-count">Couriers Online: 1</p>
        <p style="color: #ff4444; font-weight: bold;" id="mission-status">Mission: Pick up the Package</p>
        <p>Score: <span id="score">0</span></p>
    </div>

    <div id="inventory">
        <h4 style="margin: 0 0 10px 0; color: #ffcc00;">Garage (Equip)</h4>
        <button class="equip-btn active" onclick="equipItem('none')">Standard Tires</button>
        <button class="equip-btn" onclick="equipItem('shell')">Streamlined Shell (Wind)</button>
        <button class="equip-btn" onclick="equipItem('cleats')">Spiked Cleats (Ice)</button>
        <button class="equip-btn" onclick="equipItem('hull')">Boat Hull (Water)</button>
    </div>

    <div id="dialogue-box">
        <span id="dialogue-text">...</span>
        <br><small style="color: #aaa;">(Press SPACEBAR to continue)</small>
    </div>

<script>
    // ==========================================
    // 1. GAME STATE & FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
        authDomain: "symmetry-and-nets.firebaseapp.com",
        databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "symmetry-and-nets",
        storageBucket: "symmetry-and-nets.firebasestorage.app",
        messagingSenderId: "250211420064",
        appId: "1:250211420064:web:fe4a064715042bedf546c5"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    let myId = sessionStorage.getItem('aeroId');
    if (!myId) { myId = 'Courier_' + Math.random().toString(36).substr(2, 6); sessionStorage.setItem('aeroId', myId); }
    const playersRef = db.ref('aero_terra/players');
    playersRef.child(myId).onDisconnect().remove();

    let currentEquip = 'none';
    let hasPackage = false;
    let score = 0;
    let isSpinningOut = false; // NEW: Prevents movement while failing a hazard

    function equipItem(itemName) {
        currentEquip = itemName;
        document.querySelectorAll('.equip-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    let dialogueStep = 0;
    const npcLines = [
        "The wind in the northern canyon is fierce! Standard vehicles get blown away.",
        "Air resistance pushes against objects. The wider the object, the harder the push.",
        "Equip the Streamlined Shell from your garage so the air flows around you smoothly!"
    ];

    // ==========================================
    // 2. PHASER ENGINE
    // ==========================================
    let player, cursors, spacebar;
    let iceZone, windZone, waterZone;
    let packageObj, dropZoneObj, npcObj;
    let walls;
    let otherPlayers = {}; 

    function preload() { }

    function create() {
        const scene = this;

        // 1. Build the MASSIVE World (6000 x 6000)
        scene.physics.world.setBounds(0, 0, 6000, 6000);
        scene.add.grid(3000, 3000, 6000, 6000, 100, 100, 0x222222).setAltFillStyle(0x2a2a2a);

        // 2. Massive Biomes
        // Hub is at the center (3000, 3000)
        windZone = scene.add.rectangle(3000, 1000, 2000, 2000, 0xffffff, 0.1); // North
        iceZone = scene.add.rectangle(5000, 3000, 2000, 2000, 0x00aaff, 0.3); // East
        waterZone = scene.add.rectangle(3000, 5000, 2000, 2000, 0x0044ff, 0.4); // South
        
        scene.physics.add.existing(iceZone, true);
        scene.physics.add.existing(windZone, true);
        scene.physics.add.existing(waterZone, true);

        // 3. Funneling Walls (Leaving gaps to enter zones)
        walls = scene.physics.add.staticGroup();
        function buildWall(x, y, w, h) { walls.add(scene.add.rectangle(x, y, w, h, 0x555555)); }
        
        buildWall(2200, 2000, 1600, 40); // North Wall L
        buildWall(3800, 2000, 1600, 40); // North Wall R
        buildWall(4000, 2200, 40, 1600); // East Wall T
        buildWall(4000, 3800, 40, 1600); // East Wall B
        buildWall(2200, 4000, 1600, 40); // South Wall L
        buildWall(3800, 4000, 1600, 40); // South Wall R

        // 4. Core Loop Objects
        packageObj = scene.add.rectangle(2900, 3100, 40, 40, 0x00ff00); // Hub center
        scene.physics.add.existing(packageObj, true);

        dropZoneObj = scene.add.rectangle(3000, 500, 150, 150, 0xaa00ff, 0.5); // Deep in Wind Canyon
        scene.physics.add.existing(dropZoneObj, true);

        // 5. The NPC (Positioned near the North Canyon entrance)
        npcObj = scene.add.rectangle(2850, 2200, 50, 50, 0xffff00);
        scene.physics.add.existing(npcObj, true);
        scene.add.text(2800, 2150, "NPC (Press Space)", { fontSize: '16px', fill: '#fff' });

        // 6. The Player
        player = scene.add.rectangle(3000, 3000, 50, 50, 0x00ffcc);
        scene.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);
        player.body.setMaxVelocity(400); // Slightly faster max speed for the larger map
        player.oldPosition = { x: player.x, y: player.y };

        scene.physics.add.collider(player, walls);

        // 7. Inputs & Camera
        scene.cameras.main.setBounds(0, 0, 6000, 6000);
        scene.cameras.main.startFollow(player, true, 0.1, 0.1);
        // Zoom camera in slightly so the world feels bigger
        scene.cameras.main.setZoom(1.2); 
        
        cursors = scene.input.keyboard.createCursorKeys();
        spacebar = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

        // Multiplayer Sync (Unchanged)
        playersRef.on('value', (snapshot) => {
            const playersData = snapshot.val() || {};
            let onlineCount = 0;
            Object.keys(playersData).forEach((id) => {
                onlineCount++;
                const data = playersData[id];
                if (id !== myId) {
                    if (!otherPlayers[id]) { otherPlayers[id] = scene.add.rectangle(data.x, data.y, 50, 50, 0xff4444); } 
                    else { otherPlayers[id].setPosition(data.x, data.y); }
                }
            });
            document.getElementById('player-count').innerText = `Couriers Online: ${onlineCount}`;
            Object.keys(otherPlayers).forEach((id) => {
                if (!playersData[id]) { otherPlayers[id].destroy(); delete otherPlayers[id]; }
            });
        });
    }

    // NEW: The Hazard Spin-Out Function
    function triggerHazardFailure(scene, hazardName, safeX, safeY) {
        if (isSpinningOut) return;
        isSpinningOut = true;

        // Flash warning
        document.getElementById('mission-status').innerText = `HAZARD: Missing equipment for ${hazardName}!`;
        document.getElementById('mission-status').style.color = "#ff4444";

        // Stop moving and start spinning
        player.body.setAcceleration(0, 0);
        player.body.setVelocity(0, 0);
        player.body.setAngularVelocity(1000); 

        // Bounce back to safe coordinates
        scene.tweens.add({
            targets: player,
            x: safeX,
            y: safeY,
            duration: 800,
            ease: 'Power2',
            onComplete: () => {
                player.body.setAngularVelocity(0);
                player.angle = 0;
                isSpinningOut = false;
                
                // Reset mission text
                if (hasPackage) {
                    document.getElementById('mission-status').innerText = "Mission: Deliver to the Purple Zone!";
                    document.getElementById('mission-status').style.color = "#00ffcc";
                } else {
                    document.getElementById('mission-status').innerText = "Mission: Pick up the Package";
                    document.getElementById('mission-status').style.color = "#ff4444";
                }
            }
        });
    }

    function update() {
        if (!player) return;

        // --- HAZARD CHECKS (Hard Physics) ---
        const onIce = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), iceZone.getBounds());
        const inWind = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), windZone.getBounds());
        const inWater = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), waterZone.getBounds());
        
        // If they fail a hazard, trigger the spin-out and skip player inputs
        if (onIce && currentEquip !== 'cleats') {
            triggerHazardFailure(this, 'ICE', 3800, 3000); // Bounce to center-right hub
            return; 
        }
        if (inWind && currentEquip !== 'shell') {
            triggerHazardFailure(this, 'AIR RESISTANCE', 3000, 2200); // Bounce to top hub
            return;
        }
        if (inWater && currentEquip !== 'hull') {
            triggerHazardFailure(this, 'WATER RESISTANCE', 3000, 3800); // Bounce to bottom hub
            return;
        }

        // If currently spinning out, ignore arrow keys
        if (isSpinningOut) return;

        // --- NORMAL MOVEMENT LOGIC ---
        player.body.setDrag(1500); // Standard friction

        if (cursors.left.isDown) player.body.setAccelerationX(-2000);
        else if (cursors.right.isDown) player.body.setAccelerationX(2000);
        else player.body.setAccelerationX(0);

        if (cursors.up.isDown) player.body.setAccelerationY(-2000);
        else if (cursors.down.isDown) player.body.setAccelerationY(2000);
        else player.body.setAccelerationY(0);

        // --- CORE LOOP: PACKAGES & DELIVERIES ---
        const touchingPackage = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), packageObj.getBounds());
        const touchingDropZone = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), dropZoneObj.getBounds());

        if (touchingPackage && !hasPackage) {
            hasPackage = true;
            packageObj.setVisible(false);
            document.getElementById('mission-status').innerText = "Mission: Deliver to the Purple Zone!";
            document.getElementById('mission-status').style.color = "#00ffcc";
        }

        if (touchingDropZone && hasPackage) {
            hasPackage = false;
            score++;
            document.getElementById('score').innerText = score;
            document.getElementById('mission-status').innerText = "Mission: Return to Hub for next package";
            document.getElementById('mission-status').style.color = "#ff4444";
            setTimeout(() => { packageObj.setVisible(true); }, 2000);
        }

        // --- NPC DIALOGUE SYSTEM ---
        const distanceToNPC = Phaser.Math.Distance.Between(player.x, player.y, npcObj.x, npcObj.y);
        const dialogueBox = document.getElementById('dialogue-box');
        if (distanceToNPC < 150) {
            dialogueBox.style.display = 'block';
            document.getElementById('dialogue-text').innerText = npcLines[dialogueStep];
            if (Phaser.Input.Keyboard.JustDown(spacebar)) {
                dialogueStep++;
                if (dialogueStep >= npcLines.length) { dialogueStep = 0; }
            }
        } else {
            dialogueBox.style.display = 'none';
            dialogueStep = 0;
        }

        // --- MULTIPLAYER SYNC ---
        const xChanged = Math.abs(player.x - player.oldPosition.x) > 1;
        const yChanged = Math.abs(player.y - player.oldPosition.y) > 1;
        if (xChanged || yChanged) {
            playersRef.child(myId).set({ x: player.x, y: player.y });
            player.oldPosition = { x: player.x, y: player.y };
        }
    }

    const config = {
        type: Phaser.AUTO,
        scale: {
            mode: Phaser.Scale.RESIZE, // Automatically fits to browser window
            parent: 'game-container',
            width: '100%',
            height: '100%'
        },
        physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
</script>
</body>
</html>
