<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero-Terra Couriers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #game-container { border: 4px solid #fff; box-shadow: 0 0 20px #00ffcc; border-radius: 8px; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #00ffcc; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin: 0; color: #00ffcc;">Aero-Terra Couriers</h3>
        <p>Use <b>Arrow Keys</b> to drive.</p>
        <p>Notice how you <b>slide</b> on the blue ice!</p>
    </div>

    <div id="game-container"></div>

<script>
    // ==========================================
    // 1. FIREBASE SETUP
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
        authDomain: "symmetry-and-nets.firebaseapp.com",
        databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "symmetry-and-nets",
        storageBucket: "symmetry-and-nets.firebasestorage.app",
        messagingSenderId: "250211420064",
        appId: "1:250211420064:web:fe4a064715042bedf546c5"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();


    // ==========================================
    // 2. PHASER GAME LOGIC
    // ==========================================
    
    let player;
    let cursors;
    let iceZone;

    // A. PRELOAD: Load assets (We will just use generated shapes for now)
    function preload() {
        // We aren't loading external images yet, so this is empty.
    }

    // B. CREATE: Build the world
    function create() {
        // 1. Create a giant world map (1800 x 1200)
        this.physics.world.setBounds(0, 0, 1800, 1200);

        // 2. Add some grid lines to the background so we can see movement
        this.add.grid(900, 600, 1800, 1200, 50, 50, 0x333333).setAltFillStyle(0x444444);

        // 3. Create the "Ice Zone" (A slippery blue rectangle)
        iceZone = this.add.rectangle(1200, 300, 400, 400, 0x00aaff, 0.5);
        this.physics.add.existing(iceZone, true); // 'true' means it doesn't move

        // 4. Create the Player (A bright green square)
        player = this.add.rectangle(300, 300, 30, 30, 0x00ffcc);
        this.physics.add.existing(player);
        
        // Give the player physics properties
        player.body.setCollideWorldBounds(true); // Don't fall off the edge of the world
        player.body.setDrag(1500); // Standard friction (Stops quickly when you let go of keys)
        player.body.setMaxVelocity(300); // Top speed

        // 5. Tell the Camera to follow the player
        this.cameras.main.setBounds(0, 0, 1800, 1200);
        this.cameras.main.startFollow(player, true, 0.1, 0.1); // Smooth following

        // 6. Turn on the Arrow Keys
        cursors = this.input.keyboard.createCursorKeys();
    }

    // C. UPDATE: The 60fps Game Loop
    function update() {
        // 1. MOVEMENT LOGIC
        // Instead of directly changing X/Y, we apply "Acceleration" (Force)
        if (cursors.left.isDown) {
            player.body.setAccelerationX(-1500);
        } else if (cursors.right.isDown) {
            player.body.setAccelerationX(1500);
        } else {
            player.body.setAccelerationX(0);
        }

        if (cursors.up.isDown) {
            player.body.setAccelerationY(-1500);
        } else if (cursors.down.isDown) {
            player.body.setAccelerationY(1500);
        } else {
            player.body.setAccelerationY(0);
        }

        // 2. SCIENCE MECHANICS: Friction Check
        // Are we standing on the blue ice?
        const onIce = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), iceZone.getBounds());
        
        if (onIce) {
            // ICE PHYSICS: Very low friction. Hard to stop!
            player.body.setDrag(50); 
        } else {
            // NORMAL PHYSICS: High friction. Stops quickly.
            player.body.setDrag(1500); 
        }
    }


    // ==========================================
    // 3. PHASER BOOTSTRAP (Start the engine)
    // ==========================================
    const config = {
        type: Phaser.AUTO,
        width: 800,   // The size of the "window" the player sees
        height: 600,
        parent: 'game-container', // Put the canvas inside our div
        physics: {
            default: 'arcade', // The physics engine
            arcade: {
                gravity: { y: 0 }, // Top-down game, so no gravity pulling us down
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);

</script>
</body>
</html>
