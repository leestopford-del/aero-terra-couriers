<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero-Terra Couriers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #game-container { border: 4px solid #fff; box-shadow: 0 0 20px #00ffcc; border-radius: 8px; overflow: hidden; position: relative; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #00ffcc; pointer-events: auto; z-index: 100; }
        .biome-text { font-size: 0.8rem; color: #888; margin-top: 5px; }
        
        .equip-btn { display: block; width: 100%; margin-top: 15px; padding: 8px; background: #222; color: #fff; border: 1px solid #777; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .equip-btn:hover { background: #444; }
        .equip-btn.active { background: #ffaa00; color: #000; border-color: #ffaa00; box-shadow: 0 0 10px #ffaa00; }

        /* NEW: Dialogue Box UI */
        #dialogue-box {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 600px; background: rgba(20, 20, 40, 0.95); border: 2px solid #aa00ff;
            border-radius: 8px; padding: 20px; display: none; /* Hidden by default */
            z-index: 200; box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        #dialogue-speaker { font-weight: bold; color: #aa00ff; margin-bottom: 5px; text-transform: uppercase; }
        #dialogue-text { font-size: 1.1rem; line-height: 1.4; margin-bottom: 15px; }
        #dialogue-next { background: #aa00ff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; float: right; font-weight: bold; }
        #dialogue-next:hover { background: #cc44ff; }
    </style>
</head>
<body>

    <div id="ui">
        <h3 style="margin: 0; color: #00ffcc;">Aero-Terra Couriers</h3>
        <p>Use <b>Arrow Keys</b> to drive.</p>
        <p id="player-count">Couriers Online: 1</p>
        <div class="biome-text">East: Ice Lake (Friction)</div>
        <div class="biome-text">North: Wind Canyon (Air Resistance)</div>
        <button id="btn-shell" class="equip-btn">Equip Streamlined Shell</button>
    </div>

    <div id="dialogue-box">
        <div id="dialogue-speaker">Weather Station NPC</div>
        <div id="dialogue-text">...</div>
        <button id="dialogue-next">Next</button>
    </div>

    <div id="game-container"></div>

<script>
    // ==========================================
    // 1. FIREBASE SETUP
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
        authDomain: "symmetry-and-nets.firebaseapp.com",
        databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "symmetry-and-nets",
        storageBucket: "symmetry-and-nets.firebasestorage.app",
        messagingSenderId: "250211420064",
        appId: "1:250211420064:web:fe4a064715042bedf546c5"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    let myId = sessionStorage.getItem('aeroId');
    if (!myId) { myId = 'Courier_' + Math.random().toString(36).substr(2, 6); sessionStorage.setItem('aeroId', myId); }
    const playersRef = db.ref('aero_terra/players');
    playersRef.child(myId).onDisconnect().remove();

    // ==========================================
    // 2. DIALOGUE SYSTEM LOGIC
    // ==========================================
    const dialogueBox = document.getElementById('dialogue-box');
    const dialogueText = document.getElementById('dialogue-text');
    const dialogueNext = document.getElementById('dialogue-next');
    
    // The 3-Tier Scaffolding Array
    const npcLines = [
        "Whoa there, Courier! Take a look at those flags. That wind is howling straight down the canyon.",
        "If you drive a standard, bulky rig in there, the Air Resistance is going to catch your flat panels and push you right back out.",
        "You need to reduce your surface area! Use your computer to equip a Streamlined Shell so you can slice through the air."
    ];
    let currentLineIndex = 0;
    let isDialogueActive = false;

    dialogueNext.addEventListener('click', () => {
        currentLineIndex++;
        if (currentLineIndex < npcLines.length) {
            dialogueText.innerText = npcLines[currentLineIndex];
        } else {
            // End of dialogue
            dialogueBox.style.display = 'none';
            isDialogueActive = false;
        }
        // Return focus to the game window so arrow keys work immediately
        document.getElementById('game-container').querySelector('canvas').focus();
    });

    // ==========================================
    // 3. PHASER GAME LOGIC
    // ==========================================
    let player; let cursors; let iceZone; let windZone; let walls; let npc; let otherPlayers = {}; 
    let hasStreamlinedShell = false;

    function preload() { }

    function create() {
        const scene = this;

        // Background
        scene.physics.world.setBounds(0, 0, 1800, 1200);
        scene.add.grid(900, 600, 1800, 1200, 50, 50, 0x222222).setAltFillStyle(0x2a2a2a);

        // Biomes
        iceZone = scene.add.rectangle(1500, 600, 600, 600, 0x00aaff, 0.3);
        scene.physics.add.existing(iceZone, true);
        windZone = scene.add.rectangle(900, 200, 600, 400, 0xffffff, 0.1);
        scene.physics.add.existing(windZone, true);

        // Walls
        walls = scene.physics.add.staticGroup();
        function buildWall(x, y, width, height) { walls.add(scene.add.rectangle(x, y, width, height, 0x555555)); }
        buildWall(700, 400, 400, 20); 
        buildWall(1100, 400, 400, 20);
        buildWall(1200, 450, 20, 300);
        buildWall(1200, 750, 20, 300);

        // --- NEW: Create the NPC (Purple Square) ---
        // Placed right in front of the gap to the wind canyon
        npc = scene.add.rectangle(900, 450, 30, 30, 0xaa00ff);
        scene.physics.add.existing(npc, true); // true = static (player can't push them)

        // Create Player
        player = scene.add.rectangle(900, 600, 30, 30, 0x00ffcc);
        scene.physics.add.existing(player);
        player.body.setCollideWorldBounds(true);
        player.body.setMaxVelocity(300);
        player.oldPosition = { x: player.x, y: player.y, color: 0x00ffcc };

        // Collisions
        scene.physics.add.collider(player, walls);
        scene.physics.add.collider(player, npc); // Player will bump into the NPC

        // Camera & Controls
        scene.cameras.main.setBounds(0, 0, 1800, 1200);
        scene.cameras.main.startFollow(player, true, 0.1, 0.1);
        cursors = scene.input.keyboard.createCursorKeys();

        // UI Button Listener
        document.getElementById('btn-shell').addEventListener('click', (e) => {
            hasStreamlinedShell = !hasStreamlinedShell;
            e.target.classList.toggle('active');
            if (hasStreamlinedShell) { player.setFillStyle(0xffaa00); player.colorState = 0xffaa00; } 
            else { player.setFillStyle(0x00ffcc); player.colorState = 0x00ffcc; }
            document.getElementById('game-container').querySelector('canvas').focus();
        });

        // Multiplayer Listener
        playersRef.on('value', (snapshot) => {
            const playersData = snapshot.val() || {};
            let onlineCount = 0;
            Object.keys(playersData).forEach((id) => {
                onlineCount++;
                const data = playersData[id];
                if (id !== myId) {
                    if (!otherPlayers[id]) { otherPlayers[id] = scene.add.rectangle(data.x, data.y, 30, 30, data.color || 0xff4444); } 
                    else { otherPlayers[id].setPosition(data.x, data.y); if (data.color) otherPlayers[id].setFillStyle(data.color); }
                }
            });
            document.getElementById('player-count').innerText = `Couriers Online: ${onlineCount}`;
            Object.keys(otherPlayers).forEach((id) => {
                if (!playersData[id]) { otherPlayers[id].destroy(); delete otherPlayers[id]; }
            });
        });
    }

    function update() {
        if (!player) return;

        // --- NEW: NPC Proximity Check ---
        // Calculate the distance between the player and the NPC
        const distanceToNPC = Phaser.Math.Distance.Between(player.x, player.y, npc.x, npc.y);
        
        // If within 100 pixels, and the dialogue hasn't been triggered yet
        if (distanceToNPC < 100 && !isDialogueActive && currentLineIndex === 0) {
            isDialogueActive = true;
            dialogueBox.style.display = 'block';
            dialogueText.innerText = npcLines[0];
        } 
        // If the player drives away, reset the conversation
        else if (distanceToNPC >= 100) {
            isDialogueActive = false;
            dialogueBox.style.display = 'none';
            currentLineIndex = 0; // Reset so they can talk to the NPC again later
        }

        // 1. ENVIRONMENT CHECK
        const onIce = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), iceZone.getBounds());
        const inWind = Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), windZone.getBounds());

        // A. Friction
        player.body.setDrag(onIce ? 50 : 1500);

        // B. Air Resistance
        const windForce = inWind ? (hasStreamlinedShell ? 200 : 1200) : 0;

        // 2. MOVEMENT LOGIC
        if (cursors.left.isDown) player.body.setAccelerationX(-1500);
        else if (cursors.right.isDown) player.body.setAccelerationX(1500);
        else player.body.setAccelerationX(0);

        if (cursors.up.isDown) player.body.setAccelerationY(-1500 + windForce);
        else if (cursors.down.isDown) player.body.setAccelerationY(1500 + windForce);
        else player.body.setAccelerationY(0 + windForce);

        // 3. MULTIPLAYER BROADCASTER
        const xChanged = Math.abs(player.x - player.oldPosition.x) > 1;
        const yChanged = Math.abs(player.y - player.oldPosition.y) > 1;
        const colorChanged = player.colorState !== player.oldPosition.color;

        if (xChanged || yChanged || colorChanged) {
            playersRef.child(myId).set({ x: player.x, y: player.y, color: player.colorState || 0x00ffcc });
            player.oldPosition = { x: player.x, y: player.y, color: player.colorState };
        }
    }

    const config = { type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container', physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } }, scene: { preload: preload, create: create, update: update } };
    const game = new Phaser.Game(config);
</script>
</body>
</html>
