<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero-Terra Couriers</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #lobby { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #161b22 0%, #0d1117 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 500; }
        .terminal { background: #161b22; border: 2px solid #30363d; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .terminal h1 { color: #00ffcc; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        .input-group { margin: 20px 0; }
        #courier-name { padding: 10px; font-size: 1.1rem; border-radius: 4px; border: 1px solid #00ffcc; background: #000; color: #fff; width: 80%; text-align: center; }
        .btn-launch { background: #00ffcc; color: #000; font-weight: bold; border: none; padding: 12px 25px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-launch:hover { background: #fff; box-shadow: 0 0 15px #00ffcc; }
        
        .bobbing-vehicle { width: 50px; height: 50px; background: #00ffcc; margin: 0 auto 20px auto; border-radius: 8px; animation: bob 2s infinite ease-in-out; }
        @keyframes bob { 0% { transform: translateY(0); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0); } }

        #game-wrapper { display: none; width: 100vw; height: 100vh; position: relative; }
        #game-container { width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 2px solid #00ffcc; z-index: 100; pointer-events: none; }
        
        /* Garage is now hidden by default! */
        #inventory { display: none; position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; border: 2px solid #ffcc00; z-index: 100; box-shadow: 0 0 20px rgba(255,204,0,0.4); }
        .equip-btn { display: block; width: 100%; margin: 5px 0; padding: 8px; background: #333; color: white; border: 1px solid #777; cursor: pointer; border-radius: 4px; }
        .equip-btn.active { background: #ffcc00; color: black; font-weight: bold; }
        
        #dialogue-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 600px; background: rgba(0,0,0,0.9); border: 2px solid #fff; padding: 15px; border-radius: 8px; display: none; z-index: 100; text-align: center; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="lobby">
        <div class="terminal">
            <div class="bobbing-vehicle"></div>
            <h1>Aero-Terra Dispatch</h1>
            <p>Phase 2: Tilemap Engine</p>
            <div class="input-group">
                <input type="text" id="courier-name" placeholder="Enter Courier Name" autocomplete="off">
            </div>
            <button class="btn-launch" onclick="loginAndLaunch()">ENTER WORLD</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="ui">
            <h3 style="margin: 0; color: #00ffcc;" id="ui-name">Courier</h3>
            <p id="player-count">Couriers Online: 1</p>
            <p style="color: #ff4444; font-weight: bold;" id="mission-status">Mission: Pick up the Crate</p>
            <p>Score: <span id="score">0</span></p>
            <p style="color: #ffcc00; font-size: 0.9rem; max-width: 250px;" id="warning-text"></p>
        </div>

        <div id="inventory">
            <h4 style="margin: 0 0 10px 0; color: #ffcc00;">📍 ALBY'S GARAGE</h4>
            <button class="equip-btn active" onclick="equipItem('none')">Standard Tires</button>
            <button class="equip-btn" onclick="equipItem('shell')">Streamlined Shell (Wind)</button>
            <button class="equip-btn" onclick="equipItem('cleats')">Spiked Cleats (Ice)</button>
            <button class="equip-btn" onclick="equipItem('hull')">Boat Hull (Water)</button>
        </div>

        <div id="dialogue-box">
            <span id="dialogue-text">...</span>
            <br><small style="color: #aaa;">(Press SPACEBAR to continue)</small>
        </div>

        <div id="game-container"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBpf5wi0wShnatqUhcmPhSOdnd0NdBL65A",
        authDomain: "symmetry-and-nets.firebaseapp.com",
        databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "symmetry-and-nets",
        storageBucket: "symmetry-and-nets.firebasestorage.app",
        messagingSenderId: "250211420064",
        appId: "1:250211420064:web:fe4a064715042bedf546c5"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    const playersRef = db.ref('aero_terra/players');

    let myId = '';
    let myName = '';
    let currentEquip = 'none';
    let hasPackage = false;
    let score = 0;

    function loginAndLaunch() {
        const nameInput = document.getElementById('courier-name').value.trim();
        if (!nameInput) { alert("Please enter a Courier Name!"); return; }
        myName = nameInput;
        myId = 'Courier_' + Math.random().toString(36).substr(2, 6);
        playersRef.child(myId).onDisconnect().remove();

        document.getElementById('ui-name').innerText = myName;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game-wrapper').style.display = 'block';

        bootPhaserEngine();
    }

    function equipItem(itemName) {
        currentEquip = itemName;
        document.querySelectorAll('.equip-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    const npcLines = [
        "Welcome to my Garage! You'll need different parts for different terrains.",
        "That river to the South has a nasty current. You'll wash away without a Hull.",
        "Drive your vehicle inside this building whenever you need to swap parts!"
    ];
    let dialogueStep = 0;

    function bootPhaserEngine() {
        let player, cursors, spacebar, mapLayer, tilemap;
        let packageObj, dropZoneObj, npcObj;
        let otherPlayers = {}; 

        function preload() { 
            this.load.image('vehicle', 'https://labs.phaser.io/assets/sprites/car90.png');
            this.load.image('npc', 'https://labs.phaser.io/assets/sprites/spaceman.png');
            this.load.image('crate', 'https://labs.phaser.io/assets/sprites/box-item-boxed.png');
            this.load.image('dropzone', 'https://labs.phaser.io/assets/sprites/target.png');
        }

        function create() {
            const scene = this;

            // 1. GENERATE DYNAMIC TILESET TEXTURE (72x72 tiles)
            let graphics = scene.make.graphics();
            graphics.fillStyle(0x2a2a2a); graphics.fillRect(0, 0, 72, 72);    // 0: Hub Ground
            graphics.fillStyle(0xaaaaaa); graphics.fillRect(72, 0, 72, 72);   // 1: Wind Canyon
            graphics.fillStyle(0xaaffff); graphics.fillRect(144, 0, 72, 72);  // 2: Ice
            graphics.fillStyle(0x0044ff); graphics.fillRect(216, 0, 72, 72);  // 3: River Water
            graphics.fillStyle(0x553311); graphics.fillRect(288, 0, 72, 72);  // 4: Solid Wall/Rock
            graphics.generateTexture('tileset', 360, 72);

            // 2. PROCEDURAL MAP GENERATION (50x50 Grid = 3600x3600 pixels)
            const mapData = [];
            for (let y = 0; y < 50; y++) {
                const row = [];
                for (let x = 0; x < 50; x++) {
                    let tile = 0; // Default ground

                    // Outer map boundaries
                    if (x === 0 || x === 49 || y === 0 || y === 49) tile = 4;
                    
                    // WIND CANYON (North)
                    else if (y < 15 && x >= 15 && x <= 34) {
                        tile = 1; 
                        if (x === 15 || x === 34) tile = 4; // Canyon walls
                    }
                    
                    // MEANDERING RIVER (South)
                    else if (y > 34 && x >= 15 && x <= 34) {
                        // Math.sin creates the curve of the river!
                        let riverCenter = 24 + Math.floor(Math.sin(y * 0.4) * 4);
                        if (x >= riverCenter - 3 && x <= riverCenter + 3) {
                            tile = 3; // Water
                            if (Math.random() < 0.05) tile = 4; // 5% chance of a rock in the river!
                        }
                        if (x === 15 || x === 34) tile = 4; // River canyon walls
                    }
                    
                    // ICE LAKE (East)
                    else if (y >= 15 && y <= 34 && x > 34) {
                        tile = 2; // Ice
                        if (y === 15 || y === 34) tile = 4;
                    }
                    
                    // SOLID UNUSED AREA (West)
                    else if (x < 15) { tile = 4; }

                    // HUB GATES
                    else if (y === 15 && x >= 15 && x <= 34) { if (x < 22 || x > 27) tile = 4; } // North Gate
                    else if (y === 34 && x >= 15 && x <= 34) { if (x < 22 || x > 27) tile = 4; } // South Gate
                    else if (x === 34 && y >= 15 && y <= 34) { if (y < 22 || y > 27) tile = 4; } // East Gate

                    // PHYSICAL GARAGE BUILDING (Inside Hub)
                    else if (x >= 18 && x <= 22 && y >= 18 && y <= 21) {
                        if (x === 20 && y === 21) tile = 0; // The Door
                        else tile = 4; // Garage Walls
                    }

                    row.push(tile);
                }
                mapData.push(row);
            }

            // 3. BUILD THE TILEMAP
            tilemap = scene.make.tilemap({ data: mapData, tileWidth: 72, tileHeight: 72 });
            const tiles = tilemap.addTilesetImage('tileset');
            mapLayer = tilemap.createLayer(0, tiles, 0, 0);
            
            // Tell the physics engine that tile ID 4 (Brown Rock) is solid
            tilemap.setCollision(4);

            // Map Labels
            scene.add.text(1800, 350, "WIND CANYON", { fontSize: '32px', fill: '#000' }).setOrigin(0.5);
            scene.add.text(3200, 1800, "ICE LAKE", { fontSize: '32px', fill: '#000' }).setOrigin(0.5);

            // 4. OBJECT PLACEMENT (Coordinates converted to grid pixels)
            packageObj = scene.physics.add.sprite(25 * 72, 25 * 72, 'crate').setScale(1.5);
            dropZoneObj = scene.physics.add.sprite(25 * 72, 8 * 72, 'dropzone').setScale(1.5);
            
            npcObj = scene.physics.add.sprite(20 * 72, 20 * 72, 'npc');
            scene.add.text(20 * 72, 19.5 * 72, "Alby", { fontSize: '20px', fill: '#fff' }).setOrigin(0.5);

            player = scene.physics.add.sprite(24 * 72, 28 * 72, 'vehicle');
            player.body.setCollideWorldBounds(true);
            player.body.setMaxVelocity(400); 
            player.oldPosition = { x: player.x, y: player.y };

            // COLLISION: Player bounces off Rocks and Walls
            scene.physics.add.collider(player, mapLayer);

            scene.cameras.main.setBounds(0, 0, 3600, 3600);
            scene.cameras.main.startFollow(player, true, 0.1, 0.1);
            scene.cameras.main.setZoom(0.7); 
            
            cursors = scene.input.keyboard.createCursorKeys();
            spacebar = scene.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            // MULTIPLAYER LOGIC
            playersRef.on('value', (snapshot) => {
                const playersData = snapshot.val() || {};
                let onlineCount = 0;
                Object.keys(playersData).forEach((id) => {
                    onlineCount++;
                    const data = playersData[id];
                    if (id !== myId) {
                        if (!otherPlayers[id]) { 
                            otherPlayers[id] = scene.add.sprite(data.x, data.y, 'vehicle').setTint(0xff4444); 
                            otherPlayers[id].nameTag = scene.add.text(data.x, data.y - 40, data.name, { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);
                        } else { 
                            otherPlayers[id].setPosition(data.x, data.y); 
                            otherPlayers[id].setAngle(data.angle || 0);
                            otherPlayers[id].nameTag.setPosition(data.x, data.y - 40);
                        }
                    }
                });
                document.getElementById('player-count').innerText = `Couriers Online: ${onlineCount}`;
                Object.keys(otherPlayers).forEach((id) => {
                    if (!playersData[id]) { 
                        otherPlayers[id].nameTag.destroy();
                        otherPlayers[id].destroy(); 
                        delete otherPlayers[id]; 
                    }
                });
            });
        }

        function update() {
            if (!player) return;

            // NEW PHYSICS CHECK: What tile am I currently driving on?
            const currentTile = tilemap.getTileAtWorldXY(player.x, player.y);
            const tileIndex = currentTile ? currentTile.index : 0;

            const inWind = (tileIndex === 1);
            const onIce = (tileIndex === 2);
            const inWater = (tileIndex === 3);

            // GARAGE CHECK: Are we inside the physical Garage walls? (x: 18-22, y: 18-21)
            const inGarage = (player.x > 18*72 && player.x < 22*72 && player.y > 18*72 && player.y < 21*72);
            document.getElementById('inventory').style.display = inGarage ? 'block' : 'none';
            
            const warningText = document.getElementById('warning-text');
            warningText.innerText = "";
            let controlLock = false;

            // PHYSICS LOGIC
            if (inWind && currentEquip !== 'shell') {
                controlLock = true;
                warningText.innerText = "WARNING: Air Resistance! Equip Shell!";
                player.angle += 15; 
                player.body.setAcceleration(0, 0); 
                player.body.velocity.x -= 30; // Blown West
            }

            if (onIce && currentEquip !== 'cleats') {
                controlLock = true;
                warningText.innerText = "WARNING: Zero Friction! Equip Cleats!";
                player.angle += 20; 
                player.body.setDrag(5); // Slide
            } else if (!inWind) {
                player.body.setDrag(1500); // Normal driving grip
            }

            if (inWater && currentEquip !== 'hull') {
                controlLock = true;
                warningText.innerText = "WARNING: Swept away by current! Equip Hull!";
                player.angle += 5; 
                player.body.setAcceleration(0, 0);
                player.body.velocity.y += 30; // Swept South down the river
            }

            // MOVEMENT CONTROLS
            if (!controlLock) {
                if (cursors.left.isDown) { player.body.setAccelerationX(-1500); player.angle = 180; }
                else if (cursors.right.isDown) { player.body.setAccelerationX(1500); player.angle = 0; }
                else player.body.setAccelerationX(0);

                if (cursors.up.isDown) { player.body.setAccelerationY(-1500); player.angle = -90; }
                else if (cursors.down.isDown) { player.body.setAccelerationY(1500); player.angle = 90; }
                else player.body.setAccelerationY(0);
            }

            // CORE LOOP
            if (Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), packageObj.getBounds()) && !hasPackage) {
                hasPackage = true; packageObj.setVisible(false);
                document.getElementById('mission-status').innerText = "Mission: Deliver to the Target in Wind Canyon!";
                document.getElementById('mission-status').style.color = "#00ffcc";
            }
            if (Phaser.Geom.Intersects.RectangleToRectangle(player.getBounds(), dropZoneObj.getBounds()) && hasPackage) {
                hasPackage = false; score++; document.getElementById('score').innerText = score;
                document.getElementById('mission-status').innerText = "Mission: Return to Hub for next crate";
                document.getElementById('mission-status').style.color = "#ff4444";
                setTimeout(() => { packageObj.setVisible(true); }, 2000);
            }

            // NPC DIALOGUE
            if (Phaser.Math.Distance.Between(player.x, player.y, npcObj.x, npcObj.y) < 150) {
                document.getElementById('dialogue-box').style.display = 'block';
                document.getElementById('dialogue-text').innerText = npcLines[dialogueStep];
                if (Phaser.Input.Keyboard.JustDown(spacebar)) {
                    dialogueStep++; if (dialogueStep >= npcLines.length) dialogueStep = 0;
                }
            } else {
                document.getElementById('dialogue-box').style.display = 'none'; dialogueStep = 0;
            }

            // MULTIPLAYER SYNC
            const xChanged = Math.abs(player.x - player.oldPosition.x) > 1;
            const yChanged = Math.abs(player.y - player.oldPosition.y) > 1;
            if (xChanged || yChanged || controlLock) { 
                playersRef.child(myId).set({ x: player.x, y: player.y, angle: player.angle, name: myName });
                player.oldPosition = { x: player.x, y: player.y };
            }
        }

        const config = {
            type: Phaser.AUTO,
            scale: { mode: Phaser.Scale.RESIZE, width: '100%', height: '100%' }, 
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
    }
</script>
</body>
</html>
